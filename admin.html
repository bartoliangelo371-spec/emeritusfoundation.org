<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | EMERITUS FOUNDATION</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#facc15",
                        "emeritus-yellow": "#facc15",
                        "blue-900": "#1e3a8a"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Lexend', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-blue-900 text-white py-6 shadow-xl">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded-lg w-12 h-12">
                    <img src="assets/images/emeritus logo.jpeg" class="w-full h-full object-contain">
                </div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Pannello Controllo <span class="text-emeritus-yellow">Admin</span></h1>
            </div>
            <button onclick="window.logoutUser()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm font-bold transition">Esci</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- Area di Accesso Negato (Nascosta di default) -->
        <div id="accessDenied" class="hidden text-center py-24">
            <span class="material-symbols-outlined text-6xl text-red-500 mb-4">lock</span>
            <h2 class="text-3xl font-black text-blue-900 mb-2">Accesso Negato</h2>
            <p class="text-gray-500 mb-8">Non hai i permessi necessari per visualizzare questa pagina.</p>
            <a href="index.html" class="bg-blue-900 text-white px-8 py-3 rounded-xl font-bold">Torna alla Home</a>
        </div>

        <!-- Dashboard Admin -->
        <div id="adminView" class="hidden">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-4xl font-black text-blue-900 uppercase tracking-tighter">Gestione Donatori</h2>
                    <p class="text-gray-500">Visualizza e gestisci tutti gli utenti registrati alla piattaforma.</p>
                </div>
                <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <span id="userCount" class="block text-3xl font-black text-blue-900">0</span>
                    <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Utenti Totali</span>
                </div>
            </div>

            <!-- Tabella Utenti -->
            <div class="bg-white rounded-[2rem] shadow-xl border border-gray-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100 text-[10px] font-black uppercase tracking-widest text-gray-400">
                            <th class="px-8 py-6">Nome Donatore</th>
                            <th class="px-8 py-6">Email</th>
                            <th class="px-8 py-6">Data Registrazione</th>
                            <th class="px-8 py-6 text-right">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="usersList" class="divide-y divide-gray-50">
                        <!-- Generato dinamicamente -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { collection, getDocs, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'accesso-donatore.html';
                return;
            }

            // Verifica Ruolo Admin
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists() && userDoc.data().role === 'admin') {
                document.getElementById('adminView').classList.remove('hidden');
                loadUsers();
            } else {
                document.getElementById('accessDenied').classList.remove('hidden');
            }
        });

        async function loadUsers() {
            const querySnapshot = await getDocs(collection(db, "users"));
            const usersList = document.getElementById('usersList');
            const userCount = document.getElementById('userCount');
            usersList.innerHTML = '';
            let count = 0;

            querySnapshot.forEach((docSnap) => {
                const user = docSnap.data();
                if(user.role === 'admin') return; // Non mostrare se stesso o altri admin
                
                count++;
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-50/50 transition-colors";
                row.innerHTML = `
                    <td class="px-8 py-6">
                        <div class="font-bold text-blue-900">${user.displayName}</div>
                        <div class="text-[10px] text-gray-400 uppercase font-black">Donatore</div>
                    </td>
                    <td class="px-8 py-6 font-medium text-gray-600">${user.email}</td>
                    <td class="px-8 py-6 text-sm text-gray-500">${new Date(user.createdAt).toLocaleDateString('it-IT')}</td>
                    <td class="px-8 py-6 text-right">
                        <button onclick="deleteUser('${docSnap.id}', '${user.displayName}')" class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white px-4 py-2 rounded-lg font-bold text-xs transition-all flex items-center gap-2 ml-auto">
                            <span class="material-symbols-outlined text-sm">delete</span> Elimina Accesso
                        </button>
                    </td>
                `;
                usersList.appendChild(row);
            });
            userCount.innerText = count;
        }

        async function deleteUser(uid, name) {
            if (confirm(`Sei sicuro di voler revocare l'accesso a ${name}? L'utente non potrÃ  piÃ¹ accedere alla sua area riservata.`)) {
                try {
                    await deleteDoc(doc(db, "users", uid));
                    alert("Accesso revocato con successo.");
                    loadUsers();
                } catch (error) {
                    console.error("Delete Error:", error);
                    alert("Errore durante l'operazione.");
                }
            }
        }

        window.deleteUser = deleteUser;
    </script>
    <script src="js/auth.js" type="module"></script>
</body>
</html>
